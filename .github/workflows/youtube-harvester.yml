name: youtube-harvester

on:
  workflow_dispatch:

  schedule:
    - cron: "*/40 * * * *"

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install python dependencies
        run: |
          pip install requests boto3

      - name: Install yt-dlp
        run: |
          pip install yt-dlp

      - name: Run Mode Y
        env:

          RUN_MODE: Y

          # =====================
          # R2 STORAGE
          # =====================

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}

          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # =====================
          # UGC PIPELINE
          # =====================

          UGC_INBOX_PREFIX: ugc/inbox
          UGC_META_PREFIX: ugc/meta

          # =====================
          # YOUTUBE SETTINGS
          # =====================

          YOUTUBE_SEARCH_TERMS: "EA Sports FC,F1,Gran Turismo,VALORANT,CS2,League of Legends,Fortnite,Warzone,Apex Legends,Minecraft"

          YOUTUBE_MAX_RESULTS_PER_TERM: "5"
          YOUTUBE_MAX_DOWNLOADS_PER_RUN: "3"
          YOUTUBE_SEARCH_DAYS: "7"

          YOUTUBE_MIN_VIDEO_BYTES: "500000"
          YOUTUBE_MIN_DURATION_SEC: "30"
          YOUTUBE_MAX_DURATION_SEC: "14400"

        run: |
          python -u main.py
