name: Robot Editorial (Modo A) - Auto

on:
  schedule:
    - cron: "0 14 * * *" # 9am Colombia -> FFmpeg reel
    - cron: "0 20 * * *" # 3pm Colombia -> RUNWAY reel
    - cron: "0 2 * * *"  # 9pm Colombia -> FFmpeg reel
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular (no publica Threads ni IG)"
        required: false
        default: "false"
      publish_ig:
        description: "Publicar en Instagram"
        required: false
        default: "true"
      publish_threads:
        description: "Publicar en Threads"
        required: false
        default: "true"
      runway_enabled:
        description: "Forzar Runway manualmente"
        required: false
        default: "true"

# 🔒 Candado: evita que Mode A y Mode B publiquen al mismo tiempo
concurrency:
  group: robot-publisher
  cancel-in-progress: false

jobs:
  run-editorial:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run robot (MODE A)
        env:
          RUN_MODE: "A"

          # -------------------
          # PUBLICATION FLAGS
          # -------------------
          # En schedule: publica (siempre) a menos que DRY_RUN sea true (no lo es por default)
          # En dispatch: depende de inputs
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run) || 'false' }}

          ENABLE_IG_PUBLISH: ${{ (github.event_name == 'schedule' && 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_ig) || 'false' }}

          ENABLE_THREADS_PUBLISH: ${{ (github.event_name == 'schedule' && 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_threads) || 'false' }}

          # -------------------
          # RUNWAY CONTROL
          # -------------------
          # Solo el cron de las 20:00 UTC (3pm Colombia) fuerza runway en schedule
          # En dispatch lo controla el input runway_enabled
          RUNWAY_ENABLED: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 20 * * *' && 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.runway_enabled) || 'false' }}

          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}

          # -------------------
          # RUNWAY API
          # -------------------
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE: "https://api.dev.runwayml.com"
          RUNWAY_I2V_MODEL: "gen4.5"

          # -------------------
          # AUTONOMY SETTINGS
          # -------------------
          MUSIC_PROBABILITY: "0.9"
          LOGO_PROBABILITY: "0.2"
          MUSIC_SEARCH_DIR: "assets"

          # -------------------
          # R2 STORAGE
          # -------------------
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # -------------------
          # OPENAI
          # -------------------
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"

          # -------------------
          # THREADS
          # -------------------
          THREADS_USER_ACCESS_TOKEN: ${{ secrets.THREADS_USER_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_GRAPH: "https://graph.threads.net"

          # -------------------
          # INSTAGRAM
          # -------------------
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GRAPH_VERSION: "v25.0"

          # -------------------
          # REEL SETTINGS
          # -------------------
          ENABLE_REELS: "true"
          REEL_SECONDS: "5"
          REEL_W: "1080"
          REEL_H: "1920"
          ASSET_BG: "assets/bg.jpg"
          ASSET_LOGO: "assets/logo.png"
          ASSET_MUSIC: "assets/music.mp3"

        run: |
          echo "===== DEBUG ====="
          echo "EVENT_NAME=$EVENT_NAME"
          echo "EVENT_SCHEDULE=$EVENT_SCHEDULE"
          echo "DRY_RUN=$DRY_RUN"
          echo "ENABLE_IG_PUBLISH=$ENABLE_IG_PUBLISH"
          echo "ENABLE_THREADS_PUBLISH=$ENABLE_THREADS_PUBLISH"
          echo "RUNWAY_ENABLED=$RUNWAY_ENABLED"
          echo "================="
          python -u main.py
