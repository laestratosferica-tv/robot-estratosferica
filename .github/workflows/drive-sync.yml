name: Drive Sync → R2

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: drive-sync-r2
  cancel-in-progress: false

jobs:
  drive-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Run Drive Sync
        env:
          # --- R2 ---
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          # --- Google Drive Service Account ---
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}

          # --- Drive folders: inbox_manual ---
          GDRIVE_INBOX_MANUAL_FOLDER_ID: ${{ secrets.GDRIVE_INBOX_MANUAL_FOLDER_ID }}
          GDRIVE_INBOX_MANUAL_DONE_FOLDER_ID: ${{ secrets.GDRIVE_INBOX_MANUAL_DONE_FOLDER_ID }}

          # --- Drive folders: final_manual ---
          GDRIVE_FINAL_MANUAL_FOLDER_ID: ${{ secrets.GDRIVE_FINAL_MANUAL_FOLDER_ID }}
          GDRIVE_FINAL_MANUAL_DONE_FOLDER_ID: ${{ secrets.GDRIVE_FINAL_MANUAL_DONE_FOLDER_ID }}

          # --- Drive folders: final_priority ---
          GDRIVE_FINAL_PRIORITY_FOLDER_ID: ${{ secrets.GDRIVE_FINAL_PRIORITY_FOLDER_ID }}
          GDRIVE_FINAL_PRIORITY_DONE_FOLDER_ID: ${{ secrets.GDRIVE_FINAL_PRIORITY_DONE_FOLDER_ID }}

          # --- R2 prefixes ---
          UGC_INBOX_MANUAL_PREFIX: "ugc/inbox_manual/"
          UGC_FINAL_MANUAL_PREFIX: "ugc/final_manual/"
          UGC_FINAL_PRIORITY_PREFIX: "ugc/final_priority/"

          # --- Behavior ---
          MAX_FILES_PER_RUN: "20"
          ONLY_VIDEO: "true"
          DRY_RUN: "false"

        run: |
          python -u sync_drive_to_r2.py
