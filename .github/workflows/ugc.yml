name: Robot UGC Runner (Mode B)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"  # cada 20 min (ajusta)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Mode B
        run: RUN_MODE=B python -u main.py
        env:
          # R2
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # IN/OUT
          UGC_INBOX_PREFIX: "ugc/inbox"
          UGC_OUT_PREFIX: "ugc/outputs/reels"

          # IG publish (si lo quieres activo)
          ENABLE_IG_PUBLISH: "true"
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION: "v25.0"

          # OpenAI captions (opcional pero recomendado)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"

          # Estilo
          REEL_SECONDS: "12"
          REEL_FPS: "30"
          ENABLE_HUD_OVERLAYS: "true"
          HUD_DIR: "assets/hud"
          GLITCH_PROB: "0.45"
          SHAKE_PROB: "0.35"
          GRAIN: "0.08"
          SAT: "1.2"
          CONTRAST: "1.15"
          BRIGHT: "0.02"

          # Música
          ENABLE_MUSIC: "true"
          MUSIC_SEARCH_DIR: "assets"
          MUSIC_VOLUME: "0.20"
          ORIG_VOLUME: "1.00"

          # Runway intro sorpresa
          RUNWAY_ENABLED: "true"
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE: "https://api.dev.runwayml.com"
          RUNWAY_VERSION: "2024-11-06"
          RUNWAY_I2V_MODEL: "gen4.5"
          RUNWAY_INTRO_SECONDS: "3"
          RUNWAY_INTRO_PROB: "0.55"
          RUNWAY_TIMEOUT: "420"
          RUNWAY_POLL_SEC: "6"
