name: youtube-harvester

on:
  workflow_dispatch:
  schedule:
    - cron: "*/40 * * * *"

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests boto3 "yt-dlp[default]"

      - name: Write YouTube cookies
        shell: bash
        run: |
          cat <<'EOF' > youtube_cookies.txt
          ${{ secrets.YOUTUBE_COOKIES_TXT }}
          EOF

          echo "Cookies file info:"
          ls -lh youtube_cookies.txt
          wc -l youtube_cookies.txt
          head -n 3 youtube_cookies.txt || true

      - name: Check yt-dlp / runtimes
        run: |
          which python
          python --version
          which yt-dlp
          yt-dlp --version
          deno --version
          node --version

      - name: Run Mode Y
        env:
          RUN_MODE: Y

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # IMPORTANTE: alineado con Mode C
          UGC_INBOX_PREFIX: ugc/inbox
          UGC_META_PREFIX: ugc/meta
          YOUTUBE_MODE_Y_STATE_KEY: ugc/state/mode_y_state.json

          YOUTUBE_SEARCH_TERMS: "EA Sports FC,F1,Gran Turismo,VALORANT,CS2,League of Legends,Fortnite,Warzone,Apex Legends,Minecraft"
          YOUTUBE_MAX_RESULTS_PER_TERM: "5"
          YOUTUBE_MAX_DOWNLOADS_PER_RUN: "3"
          YOUTUBE_SEARCH_DAYS: "7"
          YOUTUBE_MIN_VIDEO_BYTES: "500000"
          YOUTUBE_MIN_DURATION_SEC: "30"
          YOUTUBE_MAX_DURATION_SEC: "14400"

          YT_DLP_BIN: yt-dlp
          YT_DLP_COOKIES_FILE: youtube_cookies.txt

        run: |
          python -u main.py
