name: Robot UGC Runner (Modo B)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular (no publica IG). Igual procesa, sube video a R2 y deja URLs."
        required: false
        default: "false"
      publish_ig:
        description: "Publicar en Instagram"
        required: false
        default: "true"
  schedule:
    - cron: "0 14 * * *" # 9am Colombia
    - cron: "0 20 * * *" # 3pm Colombia
    - cron: "0 2 * * *"  # 9pm Colombia

jobs:
  run-ugc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Run robot (MODE B)
        env:
          RUN_MODE: "B"
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          ENABLE_IG_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_ig || 'true' }}

          # R2
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # OpenAI (caption + voz)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"
          OPENAI_TTS_MODEL: "gpt-4o-mini-tts"

          # Instagram
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GRAPH_VERSION: "v25.0"

          # Control diario
          MAX_POSTS_PER_DAY: "1"
        run: |
          python -u main.py
