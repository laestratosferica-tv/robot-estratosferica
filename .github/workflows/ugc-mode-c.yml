name: Robot Clip Generator (Modo C)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 */4 * * *"   # cada 4 horas

concurrency:
  group: robot-clip-generator
  cancel-in-progress: false

jobs:
  ugc_mode_c:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Mode C (Clip Generator)
        run: python -u main.py
        env:
          RUN_MODE: C

          # --- R2 / S3 ---
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # --- Mode C paths/state ---
          UGC_MODE_C_STATE_KEY: ugc/state/mode_c_state.json
          UGC_LIBRARY_PREFIX: ugc/library/raw/
          UGC_CLIPS_PREFIX: ugc/library/clips/
          UGC_META_PREFIX: ugc/meta/

          # --- Mode C tuning ---
          MODE_C_CLIP_SECONDS: "8"
          MODE_C_MAX_INPUTS: "5"
          MODE_C_MAX_CLIPS_PER_VIDEO: "3"
          MODE_C_MIN_SOURCE_BYTES: "200000"

          # --- Publish control ---
          MODE_C_UPLOAD_ONLY: "false"
          MODE_C_PUBLISH_IG: "true"
          MODE_C_PUBLISH_FB: "true"
          MODE_C_PUBLISH_TIKTOK: "false"
          MODE_C_PUBLISH_YOUTUBE: "false"

          # --- Instagram publish ---
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION: "v25.0"

          # --- Facebook publish ---
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}

          # --- Shared ---
          DRY_RUN: "false"
          HTTP_TIMEOUT: "30"
