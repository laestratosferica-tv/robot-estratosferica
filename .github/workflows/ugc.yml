name: Robot UGC Runner (Modo B)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # cada 30 min (ajústalo si quieres)

permissions:
  contents: read

concurrency:
  group: ugc-mode-b
  cancel-in-progress: false

jobs:
  run-ugc-b:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Mode B
        env:
          RUN_MODE: B

          # --- R2 / S3 ---
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # --- UGC settings ---
          UGC_INBOX_PREFIX: ugc/inbox
          UGC_OUTPUT_PREFIX: ugc/outputs/reels
          UGC_MAX_ITEMS: "6"

          # --- Reel settings ---
          REEL_W: "1080"
          REEL_H: "1920"
          REEL_SECONDS: "12"

          # --- HUD overlays ---
          HUD_DIR: assets
          HUD_PREFIX: hud_
          HUD_PROBABILITY: "0.85"
          HUD_OPACITY: "0.75"

          # --- Music ---
          MUSIC_SEARCH_DIR: assets
          MUSIC_PROBABILITY: "0.65"
          MUSIC_VOLUME: "0.35"

          # --- IG publish (si lo quieres prendido) ---
          ENABLE_IG_PUBLISH: "true"
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION: "v25.0"

          # --- Safety ---
          DRY_RUN: "false"

        run: python -u main.py
