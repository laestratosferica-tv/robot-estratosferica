name: Robot Editorial (Modo A) - Auto

on:
  schedule:
    - cron: "0 14 * * *" # 9am Colombia (UTC-5 -> 14:00 UTC)
    - cron: "0 20 * * *" # 3pm Colombia
    - cron: "0 2 * * *"  # 9pm Colombia
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular (no publica Threads ni IG). Igual genera y sube assets."
        required: false
        default: "true"
      publish_ig:
        description: "Publicar en Instagram (si dry_run=false)"
        required: false
        default: "true"
      publish_threads:
        description: "Publicar en Threads (si dry_run=false)"
        required: false
        default: "true"
      runway_enabled:
        description: "Usar Runway (animación image->video) si hay API key"
        required: false
        default: "true"

jobs:
  run-editorial:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Run robot (MODE A)
        env:
          RUN_MODE: "A"

          # DRY_RUN:
          # - En schedule: false
          # - En workflow_dispatch: usa input dry_run
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}

          # IMPORTANTE:
          # Si DRY_RUN=true, FORZAMOS publish en false aunque inputs digan true
          ENABLE_IG_PUBLISH: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') && 'false' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_ig || 'true') }}
          ENABLE_THREADS_PUBLISH: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') && 'false' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_threads || 'true') }}

          # Runway (opcional)
          # - En schedule: true (si tienes créditos, si no, hará fallback sin romper)
          # - En workflow_dispatch: usa input runway_enabled
          RUNWAY_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.runway_enabled || 'true' }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE: "https://api.dev.runwayml.com"
          RUNWAY_I2V_MODEL: "gen4.5"
          RUNWAY_I2V_SECONDS: "5"

          # R2
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"

          # Threads
          THREADS_USER_ACCESS_TOKEN: ${{ secrets.THREADS_USER_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_GRAPH: "https://graph.threads.net"

          # Instagram
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GRAPH_VERSION: "v25.0"

          # Reels base
          ENABLE_REELS: "true"
          REEL_SECONDS: "5"
          REEL_W: "1080"
          REEL_H: "1920"
          ASSET_BG: "assets/bg.jpg"
          ASSET_LOGO: "assets/logo.png"
          ASSET_MUSIC: "assets/music.mp3"
        run: |
          python -u main.py
