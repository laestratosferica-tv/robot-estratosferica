name: Robot Editorial (Modo A) - Auto

on:
  schedule:
    - cron: "0 14 * * *" # 9am Colombia (UTC-5 -> 14:00 UTC)
    - cron: "0 20 * * *" # 3pm Colombia  ✅ RUNWAY
    - cron: "0 2 * * *"  # 9pm Colombia
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular (no publica Threads ni IG). Igual genera y sube assets."
        required: false
        default: "true"
      publish_ig:
        description: "Publicar en Instagram"
        required: false
        default: "true"
      publish_threads:
        description: "Publicar en Threads"
        required: false
        default: "true"
      runway_enabled:
        description: "Forzar Runway manualmente"
        required: false
        default: "true"

jobs:
  run-editorial:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Run robot (MODE A)
        env:
          RUN_MODE: "A"

          # Toggles
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          ENABLE_IG_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_ig || 'false' }}
          ENABLE_THREADS_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_threads || 'false' }}

          # ✅ RUNWAY solo en schedule de 3pm Colombia (20:00 UTC).
          # En manual, usa el input runway_enabled.
          RUNWAY_ENABLED: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 20 * * *') && 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.runway_enabled) || 'false' }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE: "https://api.dev.runwayml.com"
          RUNWAY_I2V_MODEL: "gen4.5"

          # Autonomía (random)
          MUSIC_PROBABILITY: "0.75"
          LOGO_PROBABILITY: "0.85"
          MUSIC_SEARCH_DIR: "assets"

          # R2
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"

          # Threads
          THREADS_USER_ACCESS_TOKEN: ${{ secrets.THREADS_USER_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_GRAPH: "https://graph.threads.net"

          # Instagram
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GRAPH_VERSION: "v25.0"

          # Reels base
          ENABLE_REELS: "true"
          REEL_SECONDS: "5"
          REEL_W: "1080"
          REEL_H: "1920"
          ASSET_BG: "assets/bg.jpg"
          ASSET_LOGO: "assets/logo.png"
          ASSET_MUSIC: "assets/music.mp3"
        run: |
          python -u main.py
