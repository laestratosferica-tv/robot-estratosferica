name: Robot Editorial (Modo A) - Auto

on:
  schedule:
    - cron: "0 14 * * *" # 9am Colombia
    - cron: "0 20 * * *" # 3pm Colombia -> Runway forzado
    - cron: "0 2 * * *"  # 9pm Colombia
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simular (no publica en redes)"
        required: false
        default: "false"
      publish_ig:
        description: "Publicar en Instagram"
        required: false
        default: "true"
      publish_threads:
        description: "Publicar en Threads"
        required: false
        default: "true"
      runway_enabled:
        description: "Activar Runway"
        required: false
        default: "true"
      runway_force:
        description: "Forzar Runway sí o sí"
        required: false
        default: "false"

concurrency:
  group: robot-publisher
  cancel-in-progress: false

jobs:
  run-editorial:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run robot (MODE A)
        env:
          RUN_MODE: "A"

          # -------------------
          # PUBLICATION FLAGS
          # -------------------
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}

          ENABLE_IG_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.publish_ig || 'false' }}
          ENABLE_THREADS_PUBLISH: ${{ github.event_name == 'schedule' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.publish_threads || 'false' }}

          ENABLE_FB_PUBLISH: "true"
          ENABLE_YT_PUBLISH: "true"
          ENABLE_TIKTOK_PUBLISH: "false"

          # -------------------
          # RUNWAY
          # -------------------
          RUNWAY_ENABLED: ${{ github.event_name == 'schedule' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.runway_enabled || 'false' }}
          RUNWAY_FORCE: ${{ github.event_name == 'schedule' && github.event.schedule == '0 20 * * *' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.runway_force || 'false' }}

          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}

          # -------------------
          # RUNWAY API
          # -------------------
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE: "https://api.dev.runwayml.com"
          RUNWAY_I2V_MODEL: "gen4.5"
          RUNWAY_I2V_SECONDS: "5"
          RUNWAY_TIMEOUT: "420"
          RUNWAY_POLL_SEC: "6"
          RUNWAY_MP4_RETRIES: "3"
          RUNWAY_PROBABILITY: "0.55"

          # -------------------
          # AUTONOMY SETTINGS
          # -------------------
          MUSIC_PROBABILITY: "0.9"
          LOGO_PROBABILITY: "0.2"
          MUSIC_SEARCH_DIR: "assets"

          # -------------------
          # R2 STORAGE
          # -------------------
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

          # -------------------
          # OPENAI
          # -------------------
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"

          # -------------------
          # THREADS
          # -------------------
          THREADS_USER_ACCESS_TOKEN: ${{ secrets.THREADS_USER_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_GRAPH: "https://graph.threads.net"

          # -------------------
          # INSTAGRAM
          # -------------------
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          GRAPH_VERSION: "v25.0"

          # -------------------
          # FACEBOOK
          # -------------------
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}

          # -------------------
          # YOUTUBE
          # -------------------
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # -------------------
          # TIKTOK
          # -------------------
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_OPEN_ID: ${{ secrets.TIKTOK_OPEN_ID }}

          # -------------------
          # REEL SETTINGS
          # -------------------
          ENABLE_REELS: "true"
          REEL_SECONDS: "10"
          REEL_W: "1080"
          REEL_H: "1920"
          ASSET_BG: "assets/bg.jpg"
          ASSET_LOGO: "assets/logo.png"
          ASSET_MUSIC: "assets/music.mp3"

        run: |
          echo "===== DEBUG ====="
          echo "EVENT_NAME=$EVENT_NAME"
          echo "EVENT_SCHEDULE=$EVENT_SCHEDULE"
          echo "DRY_RUN=$DRY_RUN"
          echo "ENABLE_IG_PUBLISH=$ENABLE_IG_PUBLISH"
          echo "ENABLE_THREADS_PUBLISH=$ENABLE_THREADS_PUBLISH"
          echo "ENABLE_FB_PUBLISH=$ENABLE_FB_PUBLISH"
          echo "ENABLE_YT_PUBLISH=$ENABLE_YT_PUBLISH"
          echo "ENABLE_TIKTOK_PUBLISH=$ENABLE_TIKTOK_PUBLISH"
          echo "RUNWAY_ENABLED=$RUNWAY_ENABLED"
          echo "RUNWAY_FORCE=$RUNWAY_FORCE"
          echo "================="
          python -u main.py
